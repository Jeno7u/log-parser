services:
    db:
        image: postgres:16-alpine
        env_file:
            - ./.env
        ports:
            - "5432:5432"
        volumes:
            - db_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U log_parser -d log_parser"]
            interval: 5s
            timeout: 5s
            retries: 10

    app:
        build:
            context: ./log-parser-service
            dockerfile: Dockerfile
        environment:
            PORT: ${PORT:-8080}
            LOG_LEVEL: ${LOG_LEVEL:-info}
            DATABASE_URL: ${DATABASE_URL:-postgres://log_parser:log_parser@db:5432/log_parser?sslmode=disable}
            DATA_DIR: ${DATA_DIR:-/app/data}
        ports:
            - "${HOST_PORT:-8081}:8080"
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - ./data:/app/data

volumes:
    db_data:
