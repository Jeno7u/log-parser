services:
    db:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-log_parser}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-log_parser}
            POSTGRES_DB: ${POSTGRES_DB:-log_parser}
        ports:
            - "5432:5432"
        volumes:
            - db_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"',
                ]
            interval: 5s
            timeout: 5s
            retries: 10

    app:
        build:
            context: ./log-parser-service
            dockerfile: Dockerfile
        environment:
            PORT: ${PORT:-8080}
            LOG_LEVEL: ${LOG_LEVEL:-info}
            DATABASE_URL: postgres://${POSTGRES_USER:-log_parser}:${POSTGRES_PASSWORD:-log_parser}@db:5432/${POSTGRES_DB:-log_parser}?sslmode=disable
            DATA_DIR: ${DATA_DIR:-/app/data}
        ports:
            - "${HOST_PORT:-8081}:8080"
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - ./data:/app/data

volumes:
    db_data:
